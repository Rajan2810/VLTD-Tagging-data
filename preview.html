<!DOCTYPE html>
<html>
<head>
    <title>Bulk Upload Preview</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        .table-container {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2>Preview Bulk Upload</h2>

    <form method="post" action="{{ url_for('confirm_upload') }}">
        <input type="hidden" name="tmp_filename" value="{{ tmp_filename }}">
        <div class="table-container">
            {{ table|safe }}
        </div>
        <button type="submit" class="btn btn-success">Confirm Upload</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
